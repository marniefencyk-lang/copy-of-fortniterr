<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini 2D Battle Royale</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #444;
            background-color: #111;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #ui {
            margin-top: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="ui">Players Alive: <span id="aliveCount">6</span> | Health: <span id="healthDisplay">100</span></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game State
let keys = {};
let mouse = { x: 0, y: 0 };
let gameOver = false;
let victory = false;

// The World Map Boundaries (larger than the visible screen)
const MAP_SIZE = 1500;

// Camera object to follow the player
const camera = { x: 0, y: 0 };

// Player Object
const player = {
    x: MAP_SIZE / 2,
    y: MAP_SIZE / 2,
    radius: 15,
    speed: 4,
    health: 100,
    maxHealth: 100,
    color: "#00ffcc",
    isAlive: true
};

// Game Entities Arrays
let bots = [];
let bullets = [];

// The Storm Circle Setup
const storm = {
    x: MAP_SIZE / 2,
    y: MAP_SIZE / 2,
    radius: MAP_SIZE / 1.4,
    targetRadius: MAP_SIZE / 1.4,
    shrinkRate: 0.2
};

// Spawn 5 Enemy Bots Randomly
for (let i = 0; i < 5; i++) {
    bots.push({
        id: i,
        x: Math.random() * (MAP_SIZE - 100) + 50,
        y: Math.random() * (MAP_SIZE - 100) + 50,
        radius: 15,
        speed: 2,
        health: 100,
        maxHealth: 100,
        color: "#ff4444",
        shootCooldown: 0,
        isAlive: true
    });
}

// Event Listeners for Controls
window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

canvas.addEventListener("mousedown", () => {
    if (player.isAlive && !gameOver) {
        // Calculate world coordinates of the mouse click based on camera view
        const worldMouseX = mouse.x + camera.x;
        const worldMouseY = mouse.y + camera.y;
        
        // Angle from player to mouse
        const angle = Math.atan2(worldMouseY - player.y, worldMouseX - player.x);
        
        bullets.push({
            x: player.x,
            y: player.y,
            dx: Math.cos(angle) * 8,
            dy: Math.sin(angle) * 8,
            radius: 4,
            fromPlayer: true
        });
    }
});

// Update Game Variables Matrix
function update() {
    if (gameOver) return;

    // --- 1. Player Movement ---
    if (player.isAlive) {
        if (keys['w'] || keys['arrowup']) player.y -= player.speed;
        if (keys['s'] || keys['arrowdown']) player.y += player.speed;
        if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
        if (keys['d'] || keys['arrowright']) player.x += player.speed;

        // Keep player inside map bounds
        player.x = Math.max(player.radius, Math.min(MAP_SIZE - player.radius, player.x));
        player.y = Math.max(player.radius, Math.min(MAP_SIZE - player.radius, player.y));
    }

    // --- 2. Camera tracking player ---
    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;
    // Bind camera to map edge
    camera.x = Math.max(0, Math.min(MAP_SIZE - canvas.width, camera.x));
    camera.y = Math.max(0, Math.min(MAP_SIZE - canvas.height, camera.y));

    // --- 3. Shrink the Storm ---
    if (storm.radius > 50) {
        storm.radius -= storm.shrinkRate;
    }

    // --- 4. Storm Damage Logic ---
    let aliveCount = player.isAlive ? 1 : 0;

    // Check player storm status
    if (player.isAlive) {
        let distToStormCenter = Math.hypot(player.x - storm.x, player.y - storm.y);
        if (distToStormCenter > storm.radius) {
            player.health -= 0.1; // Takes ticks of damage outside safety
            if (player.health <= 0) player.isAlive = false;
        }
    }

    // --- 5. Bot Logic (AI Movement & Shooting) ---
    bots.forEach(bot => {
        if (!bot.isAlive) return;
        aliveCount++;

        // Bot behavior: slowly pace toward player if alive
        if (player.isAlive) {
            let angleToPlayer = Math.atan2(player.y - bot.y, player.x - bot.x);
            bot.x += Math.cos(angleToPlayer) * bot.speed;
            bot.y += Math.sin(angleToPlayer) * bot.speed;

            // Randomly shoot at player
            bot.shootCooldown--;
            if (bot.shootCooldown <= 0 && Math.random() < 0.02) {
                bullets.push({
                    x: bot.x,
                    y: bot.y,
                    dx: Math.cos(angleToPlayer) * 6,
                    dy: Math.sin(angleToPlayer) * 6,
                    radius: 4,
                    fromPlayer: false
                });
                bot.shootCooldown = 60; // cooldown buffer frame ticks
            }
        }

        // Check if bot is in storm
        let distToStormCenter = Math.hypot(bot.x - storm.x, bot.y - storm.y);
        if (distToStormCenter > storm.radius) {
            bot.health -= 0.1;
            if (bot.health <= 0) bot.isAlive = false;
        }
    });

    // --- 6. Bullet Physics & Hits ---
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.dx;
        b.y += b.dy;

        // Destroy bullets out of map bounds
        if (b.x < 0 || b.x > MAP_SIZE || b.y < 0 || b.y > MAP_SIZE) {
            bullets.splice(i, 1);
            continue;
        }

        // Bullet hitting bots
        if (b.fromPlayer) {
            for (let j = 0; j < bots.length; j++) {
                let bot = bots[j];
                if (bot.isAlive && Math.hypot(b.x - bot.x, b.y - bot.y) < bot.radius + b.radius) {
                    bot.health -= 25; // Weapon damage
                    if (bot.health <= 0) bot.isAlive = false;
                    bullets.splice(i, 1);
                    break;
                }
            }
        } else {
            // Enemy bullets hitting player
            if (player.isAlive && Math.hypot(b.x - player.x, b.y - player.y) < player.radius + b.radius) {
                player.health -= 15;
                if (player.health <= 0) player.isAlive = false;
                bullets.splice(i, 1);
            }
        }
    }

    // --- 7. Win/Loss Conditions ---
    document.getElementById("aliveCount").innerText = aliveCount;
    document.getElementById("healthDisplay").innerText = Math.max(0, Math.floor(player.health));

    if (!player.isAlive) {
        gameOver = true;
        victory = false;
    } else if (aliveCount === 1 && player.isAlive) {
        gameOver = true;
        victory = true;
    }
}

// Rendering graphics onto the screen canvas frame
function draw() {
    // Clear screen
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // Move viewport camera view tracking matrix offset
    ctx.translate(-camera.x, -camera.y);

    // Draw Map Border Grid lines
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 5;
    ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

    // Draw Storm Zone Ring
    ctx.strokeStyle = "rgba(0, 100, 255, 0.4)";
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.arc(storm.x, storm.y, storm.radius, 0, Math.PI * 2);
    ctx.stroke();

    // Draw Bullets
    ctx.fillStyle = "#ffff00";
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
    });

    // Draw Enemy Bots
    bots.forEach(bot => {
        if (!bot.isAlive) return;
        ctx.fillStyle = bot.color;
        ctx.beginPath();
        ctx.arc(bot.x, bot.y, bot.radius, 0, Math.PI * 2);
        ctx.fill();

        // Draw Health Bar
        ctx.fillStyle = "red";
        ctx.fillRect(bot.x - 15, bot.y - 25, 30, 4);
        ctx.fillStyle = "green";
        ctx.fillRect(bot.x - 15, bot.y - 25, (bot.health / bot.maxHealth) * 30, 4);
    });

    // Draw Player character
    if (player.isAlive) {
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fill();

        // Player aiming directional indicator pointing at mouse cursor
        const worldMouseX = mouse.x + camera.x;
        const worldMouseY = mouse.y + camera.y;
        const angle = Math.atan2(worldMouseY - player.y, worldMouseX - player.x);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + Math.cos(angle) * 25, player.y + Math.sin(angle) * 25);
        ctx.stroke();
    }

    ctx.restore();

    // Draw Endgame HUD overlays
    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = "bold 40px sans-serif";
        ctx.fillStyle = victory ? "#00ffcc" : "#ff4444";
        ctx.textAlign = "center";
        let text = victory ? "VICTORY ROYALE!" : "ELIMINATED! GAME OVER";
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        
        ctx.font = "20px sans-serif";
        ctx.fillStyle = "white";
        ctx.fillText("Refresh browser page to jump back from the Battle Bus!", canvas.width / 2, canvas.height / 2 + 50);
    }
}

// System Core Game Processing Engine loop ticks
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Start Game
gameLoop();
</script>
</body>
</html>
